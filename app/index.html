<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ELD Compliance Monitor</title>
  <link rel="stylesheet" href="styles/main.css?v=1" />
</head>
<body>

<div id="ecm-root">

  <!-- Toolbar -->
  <div class="ecm-toolbar">
    <div class="ecm-control-group">
      <label class="ecm-label">Search</label>
      <input type="text" class="ecm-input" id="ecm-search" placeholder="Search drivers...">
    </div>
    <span class="ecm-driver-count" id="ecm-driver-count"></span>
    <div style="flex:1"></div>
    <span class="ecm-violations-badge none" id="ecm-violations-summary">0 Violations</span>
    <div class="ecm-refresh-controls">
      <label class="ecm-label" for="ecm-refresh-interval">Refresh</label>
      <select id="ecm-refresh-interval" class="ecm-select" style="min-width:80px;">
        <option value="120">2 min</option>
        <option value="180">3 min</option>
        <option value="300" selected>5 min</option>
      </select>
      <span class="ecm-countdown" id="ecm-countdown">--:--</span>
      <button id="ecm-refresh-btn" class="ecm-btn ecm-btn-primary">&#x21bb; Refresh</button>
    </div>
  </div>

  <!-- Status Message -->
  <div class="ecm-status" id="ecm-status"></div>

  <!-- Content -->
  <div id="ecm-content">

    <!-- Fleet Table -->
    <div class="ecm-table-wrap">
      <table class="ecm-table" id="ecm-fleet-table">
        <thead>
          <tr>
            <th class="ecm-sortable" data-sort="name">Driver <span class="ecm-sort-arrow"></span></th>
            <th class="ecm-sortable" data-sort="status">Status <span class="ecm-sort-arrow"></span></th>
            <th class="ecm-sortable" data-sort="drive">Drive Remaining <span class="ecm-sort-arrow"></span></th>
            <th class="ecm-sortable" data-sort="duty">Duty Remaining <span class="ecm-sort-arrow"></span></th>
            <th class="ecm-sortable" data-sort="break">Break <span class="ecm-sort-arrow"></span></th>
            <th class="ecm-sortable" data-sort="cycle">Cycle Remaining <span class="ecm-sort-arrow"></span></th>
            <th class="ecm-sortable" data-sort="violations">Violations <span class="ecm-sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="ecm-fleet-body"></tbody>
      </table>
    </div>

    <!-- Loading Overlay -->
    <div id="ecm-loading" style="display:none;">
      <div class="ecm-spinner-wrap">
        <div class="ecm-spinner"></div>
        <p id="ecm-loading-text">Loading drivers...</p>
      </div>
    </div>

    <!-- Empty State -->
    <div id="ecm-empty" style="display:none;">
      <p>No driver data available.</p>
    </div>

  </div>

  <!-- Detail Panel Overlay -->
  <div class="ecm-detail-overlay" id="ecm-detail-overlay"></div>

  <!-- Detail Panel (slide-in) -->
  <div class="ecm-detail-panel" id="ecm-detail-panel">
    <div class="ecm-detail-header">
      <div>
        <h2 id="ecm-detail-name">Driver Name</h2>
        <div class="ecm-detail-subtitle">
          <span id="ecm-detail-ruleset">HOS Ruleset</span>
          &nbsp;&middot;&nbsp;
          <span class="ecm-status-badge ecm-status-default" id="ecm-detail-status">--</span>
        </div>
      </div>
      <button class="ecm-detail-close" id="ecm-detail-close">&times;</button>
    </div>
    <div class="ecm-detail-body">
      <!-- SVG Arc Gauges -->
      <div class="ecm-gauges" id="ecm-gauges">
        <div class="ecm-gauge-card">
          <svg id="ecm-gauge-drive" width="100" height="70" viewBox="0 0 100 70"></svg>
          <div class="ecm-gauge-label">Drive</div>
          <div class="ecm-gauge-value" id="ecm-gauge-drive-val">--</div>
        </div>
        <div class="ecm-gauge-card">
          <svg id="ecm-gauge-duty" width="100" height="70" viewBox="0 0 100 70"></svg>
          <div class="ecm-gauge-label">Duty</div>
          <div class="ecm-gauge-value" id="ecm-gauge-duty-val">--</div>
        </div>
        <div class="ecm-gauge-card">
          <svg id="ecm-gauge-cycle" width="100" height="70" viewBox="0 0 100 70"></svg>
          <div class="ecm-gauge-label">Cycle</div>
          <div class="ecm-gauge-value" id="ecm-gauge-cycle-val">--</div>
        </div>
        <div class="ecm-gauge-card">
          <svg id="ecm-gauge-break" width="100" height="70" viewBox="0 0 100 70"></svg>
          <div class="ecm-gauge-label">Break</div>
          <div class="ecm-gauge-value" id="ecm-gauge-break-val">--</div>
        </div>
      </div>
      <!-- Violations -->
      <div class="ecm-detail-section">
        <div class="ecm-detail-section-title">Violations</div>
        <div id="ecm-detail-violations"><div class="ecm-no-violations">No active violations</div></div>
      </div>
      <!-- 7-Day Recap -->
      <div class="ecm-detail-section">
        <div class="ecm-detail-section-title">7-Day Recap</div>
        <div class="ecm-recap-container"><canvas id="ecm-recap-canvas"></canvas></div>
      </div>
      <!-- Recent Status Log -->
      <div class="ecm-detail-section">
        <div class="ecm-detail-section-title">Recent Status Log</div>
        <div id="ecm-detail-logs"><div class="ecm-detail-loading"><span class="ecm-spinner-sm"></span> Loading logs...</div></div>
      </div>
    </div>
  </div>

</div>

<script src="scripts/main.js?v=1"></script>
</body>
</html>
